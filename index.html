<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For You</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="gradient-bg"></div>
    <div id="click-handler"></div>

    <div class="main-wrapper">
        <div class="center-content">
            <div class="profile-container">
                <img src="heart.jpg" class="pfp" alt="Lipps Candy">
                <div class="glow-ring"></div>
            </div>
            <h1 class="target-name">Lipps Candy</h1>
            <p class="sub-text">FOR YOU</p>
        </div>

        <div class="glass-player">
            <div class="player-content">
                <div class="song-meta">
                    <h2 class="song-title">No One Noticed</h2>
                    <p class="artist-name">The Marías</p>
                </div>
                <audio id="main-audio" src="song.mp3" preload="auto"></audio>
                <button id="play-btn" class="play-trigger">▶</button>
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progress"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
