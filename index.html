<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="gradient-bg"></div>
    <div class="container">
        <div class="lyrics-container" id="lyrics-box">
            <p class="lyric-line active">I'm not used to this...</p>
            <p class="lyric-line">All this love and all this bliss.</p>
            <p class="lyric-line">I've been hiding in the shadows,</p>
            <p class="lyric-line">Hoping no one noticed this.</p>
            <p class="lyric-line">But you did...</p>
            <p class="lyric-line">Yeah, you really did.</p>
        </div>

        <div class="player-card">
            <div class="album-art"><img src="heart.jpg" alt="Art"></div>
            <div class="track-info">
                <h2>No One Noticed</h2>
                <p>The Marías</p>
            </div>
            <audio id="main-audio" src="song.mp3"></audio>
            <button id="play-btn">▶ Play</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
